<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vidéo 360</title>
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script>
AFRAME.registerComponent('absolute-orientation', {
  init: function () {
    this.onClick = this.onClick.bind(this);
    window.addEventListener('click', this.onClick);
  },
  onClick: function () {
    var videoEl = document.querySelector('#video360');
    videoEl.play();
    
    var sceneEl = this.el.sceneEl;
    if (sceneEl.is('vr-mode')) return;
    sceneEl.enterVR(); 
    
    window.removeEventListener('click', this.onClick);
  }
});
</script>
</head>
<body>
<a-scene absolute-orientation>
<a-assets>
<video id="video360" src="360niff.mp4" loop crossorigin="anonymous" playsinline></video>
</a-assets>
<a-videosphere src="#video360"></a-videosphere>
</a-scene>
</body>
</html>
