<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vidéo 360° NIFFF</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #startButton {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: black;
      color: white;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <button id="startButton">
    Touchez pour lancer la vidéo 360°
  </button>

  <a-scene
    vr-mode-ui="enabled: true"
    embedded
    device-orientation-permission-ui="enabled: true"
    renderer="antialias: true">

    <a-assets>
      <video
        id="video360"
        src="360niff.mp4"
        preload="auto"
        loop
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <!-- Fixe l’orientation initiale.
         Ajuste la valeur Y pour aligner ton "nord" -->
    <a-videosphere
      src="#video360"
      rotation="0 0 0">
    </a-videosphere>

    <a-camera
      id="camera"
      position="0 1.6 0"
      rotation="0 0 0"
      look-controls="enabled: true; magicWindowTrackingEnabled: false; touchEnabled: true; mouseEnabled: true">
    </a-camera>

  </a-scene>

  <script>
    const video = document.getElementById('video360');
    const button = document.getElementById('startButton');
    const camera = document.getElementById('camera');

    // Fonction pour démarrer la vidéo avec son
    async function startVideo() {
      try {
        video.muted = false;
        video.volume = 1.0;
        video.play();
        button.style.display = 'none';
      } catch (err) {
        // Si impossible, redémarre muet (ex. iPhone)
        video.muted = true;
        video.play();
        button.style.display = 'none';
      }
    }

    button.addEventListener('click', startVideo);
    button.addEventListener('touchstart', startVideo, { once: true });

    video.addEventListener('ended', () => {
      video.currentTime = 0;
      video.play();
    });
  </script>
</body>
</html>
