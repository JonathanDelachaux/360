<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Vidéo 360° Fixe</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }
    #startButton {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: black;
      color: white;
      border: none;
      font-size: 22px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="startButton">Touchez pour lancer la vidéo 360°</button>

  <a-scene embedded vr-mode-ui="enabled: true" device-orientation-permission-ui="enabled: true" renderer="antialias: true">
    <a-assets>
      <video id="video360" src="360_NIFF.mp4" loop preload="auto" playsinline webkit-playsinline></video>
    </a-assets>

    <!-- Vidéo fixe dans l’espace virtuel -->
    <a-videosphere src="#video360" rotation="0 45 0"></a-videosphere>

    <a-camera look-controls="enabled: true; magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true">
    </a-camera>
  </a-scene>

  <script>
    const video = document.getElementById('video360');
    const button = document.getElementById('startButton');

    async function startVideo() {
      try {
        video.muted = false;
        video.volume = 1.0;
        await video.play();
      } catch {
        video.muted = true;
        await video.play();
      }
      button.style.display = 'none';
    }

    button.addEventListener('click', startVideo);
  </script>
</
